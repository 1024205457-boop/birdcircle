# BirdCircle 后端服务 (Flask + SQLite, port 8001)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html/birdcircle;
    index birdcircle.html;

    # 百度 AI 识鸟代理
    location /api/baidu/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 后端 API（鸟讯/打卡）
    location ~ ^/api/(report|checkin|health) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type application/json;
        client_max_body_size 10m;
    }

    # 鸟讯照片上传
    location /api/report/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10m;
    }

    # 静态文件
    location / {
        try_files $uri $uri/ =404;
    }
}
